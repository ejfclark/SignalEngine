# SignalEngine configuration. Every value here can be left at default;
# the CLI --asset flag picks which universe a command runs against.

[data]
# "parquet" reads the local lake written by `signalengine export-parquet` (fast, no DB).
# "sql" reads the EdStock database directly (connection string from EDSTOCK_CONN env / .env).
source = "parquet"
parquet_dir = "data/parquet"
artifacts_dir = "artifacts"
# License fallback: set to "stocks-core" if ever back on the free Tiingo tier
# (the full universe exceeds free's 500-unique-symbols/month; the hourly cron
# retry slots and the rate-limit breaker handle the slower drip automatically).
stocks_universe = "stocks"
# The stock MODEL stays on core until the S&P additions have fundamentals
# history (A/B bench 2026-07-10: expansion without pe_ratio coverage degraded
# Sharpe 1.17 -> 0.66). Collection continues on the full universe regardless.
stocks_model_universe = "stocks-core"

[labels]
# Triple-barrier: from entry (next day's open), take-profit at +target_atr_mult * ATR14,
# stop-loss at -stop_atr_mult * ATR14, give up after horizon_days trading days.
# 3.0 / 1.5 = a 2:1 reward:risk swing trade. Per-book overrides below, each
# adopted from bench evidence (artifacts/bench/).
horizon_days = 10
target_atr_mult = 3.0
stop_atr_mult = 1.5

# Exp D 2026-07-10: barrier sweep selected h15 on early folds (Sharpe 1.68),
# late folds confirmed (1.42) — crypto longs get more room to work.
[labels.crypto]
horizon_days = 15

# Exp B1 2026-07-10: meta-labeling — only score uptrend names near their highs.
# Stock book went from +0.5%/trade Sharpe 0.6 to +1.1%/trade Sharpe 1.59.
[labels.stock]
candidate_query = "dist_sma200 > 0 and dist_20d_high > -0.10"

[cv]
# Purged walk-forward: n_folds contiguous test blocks, train strictly before each,
# with purge_days (>= label horizon) dropped from the end of train to stop label leakage.
n_folds = 5
purge_days = 10
# Lockbox: bench/experiments exclude everything from this date on. Spent ONCE
# per frozen system via `signalengine lockbox-eval`, then move the date forward.
# (Carved 2026-07-10; note: experiments before this date had seen these months
# via fold 4 — first eval is a gross-overfit check, the ledger is the clean gate.)
lockbox_start = "2026-03-15"

[model]
n_estimators = 400
learning_rate = 0.05
num_leaves = 63
min_child_samples = 50

[backtest]
# Only out-of-sample predictions are ever backtested.
probability_threshold = 0.60
fee_bps = 10.0        # per side
slippage_bps = 10.0   # per side
max_positions = 10

# Portfolio rules are adopted per asset, on that asset's own bench evidence
# (artifacts/bench/). Crypto: constant-risk sizing + breadth gate lifted OOS
# Sharpe 0.72 -> 1.3 (2026-07-09). Stocks: the same grid showed no benefit, so
# stocks keep plain equal sizing until an experiment proves otherwise.
[backtest.crypto]
probability_threshold = 0.65
sizing = "vol"
risk_pct = 0.01
gate_column = "breadth_20d"
gate_min = 0.30

# Exp B1: with the candidate filter, 0.65 is the stock sweet spot (Sharpe 1.59).
[backtest.stock]
probability_threshold = 0.65

# Shorts trade at the strict threshold only (adopted from the shorts benches);
# crypto shorts are deliberately UNGATED — breakdowns short fine in any tape.
[backtest.crypto-short]
probability_threshold = 0.70
sizing = "vol"
risk_pct = 0.01

[backtest.stock-short]
probability_threshold = 0.70

[signals]
probability_threshold = 0.55
